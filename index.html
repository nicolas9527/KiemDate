<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KIỂM DATE" />
  <link rel="apple-touch-icon" href="icon.png.PNG" />
  <link rel="icon" type="image/png" href="icon.png.PNG" />

  <title>KIỂM DATE</title>

  <style>
    :root {
      --primary:#1976d2;
      --secondary:#64b5f6;
      --bg:#eef4fb;
      --card:rgba(255,255,255,0.72);
      --card-strong:rgba(255,255,255,0.88);
      --danger:#d32f2f;
      --warn:#ef6c00;
      --ok:#1b5e20;
      --text:#233043;

      --actions-right: 16px;

      --radius-xl:24px;
      --radius-lg:20px;
      --radius-md:15px;

      --shadow-soft:0 8px 30px rgba(15, 23, 42, 0.08);
      --shadow-card:0 10px 28px rgba(15, 23, 42, 0.08);
      --shadow-float:0 16px 36px rgba(25, 118, 210, 0.16);

      --glass-border:1px solid rgba(255,255,255,0.55);
      --blur:blur(18px);

      --ease:cubic-bezier(.22,.8,.2,1);
      --ease-bounce:cubic-bezier(.34,1.56,.64,1);
    }

    *{ box-sizing:border-box; }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(100,181,246,0.28), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(25,118,210,0.14), transparent 28%),
        linear-gradient(180deg, #f4f8fd 0%, #edf3f9 100%);
      padding:12px;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      position:relative;
      overflow-x:hidden;
      animation:pageIn .45s var(--ease);
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      border-radius:999px;
      filter:blur(50px);
      opacity:.45;
      z-index:0;
    }

    body::before{
      width:180px;
      height:180px;
      left:-40px;
      top:120px;
      background:rgba(100,181,246,0.20);
      animation:floatGlow 8s ease-in-out infinite;
    }

    body::after{
      width:220px;
      height:220px;
      right:-70px;
      top:40px;
      background:rgba(25,118,210,0.14);
      animation:floatGlow 10s ease-in-out infinite reverse;
    }

    .app{
      max-width:520px;
      margin:0 auto;
      position:relative;
      z-index:1;
      animation:appRise .5s var(--ease);
    }

    h1{
      text-align:center;
      color:var(--primary);
      font-size:22px;
      margin:10px 0 12px;
      font-weight:900;
      letter-spacing:0.2px;
      animation:fadeDown .45s var(--ease);
      text-shadow:0 1px 0 rgba(255,255,255,.7);
    }

    .input-box,
    .data-manager{
      background:var(--card);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      border:var(--glass-border);
      box-shadow:var(--shadow-soft);
      transition:
        transform .28s var(--ease),
        box-shadow .28s var(--ease),
        background .28s var(--ease);
    }

    .input-box{
      border-radius:24px;
      padding:18px;
      margin-bottom:12px;
      animation:fadeUp .48s var(--ease);
    }

    .input-box:hover,
    .data-manager:hover{
      box-shadow:var(--shadow-float);
      transform:translateY(-1px);
    }

    .input-group{
      margin-bottom:14px;
      width:100%;
      position:relative;
    }

    label{
      color:var(--primary);
      font-weight:800;
      font-size:13px;
      display:block;
      margin:0 0 6px 8px;
      transition:transform .2s var(--ease), opacity .2s var(--ease);
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"],
    input[type="date"]{
      width:100%;
      height:50px;
      border-radius:15px;
      border:1.5px solid rgba(209,217,224,0.9);
      padding:0 14px;
      font-size:16px;
      outline:none;
      background:rgba(249,251,255,0.82);
      text-align:center;
      display:block;
      color:#1e293b;
      transition:
        border-color .22s var(--ease),
        background .22s var(--ease),
        box-shadow .22s var(--ease),
        transform .18s var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
    }

    input::placeholder{
      color:#8fa1b6;
      transition:opacity .2s var(--ease), transform .2s var(--ease);
    }

    input:focus{
      border-color:rgba(100,181,246,0.95);
      background:rgba(255,255,255,0.96);
      box-shadow:0 0 0 4px rgba(100,181,246,0.16), 0 6px 18px rgba(25,118,210,0.08);
      transform:translateY(-1px);
    }

    input:focus::placeholder{
      color:transparent;
      transform:translateY(-2px);
    }

    input[type="date"]{
      height:50px;
      line-height:50px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-appearance:none;
      appearance:none;
      min-height:50px;
      scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;
    }

    input[type="date"]::-webkit-date-and-time-value{
      height:50px;
      line-height:50px;
      text-align:center;
      margin:0;
      padding:0;
    }

    input[type="date"]::-webkit-calendar-picker-indicator{
      margin:0;
      padding:0;
      opacity:.9;
      transition:transform .2s var(--ease), opacity .2s var(--ease);
    }

    input[type="date"]:focus::-webkit-calendar-picker-indicator{
      transform:scale(1.08);
      opacity:1;
    }

    .suggestions{
      position:absolute;
      top:76px;
      left:0;
      right:0;
      background:rgba(255,255,255,0.9);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-radius:15px;
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
      z-index:100;
      max-height:220px;
      overflow:auto;
      display:none;
      border:1px solid rgba(255,255,255,0.65);
      transform:translateY(8px);
      opacity:0;
      transition:
        opacity .22s var(--ease),
        transform .22s var(--ease);
    }

    .suggestions.show{
      display:block;
      opacity:1;
      transform:translateY(0);
    }

    .sug-item{
      padding:12px 14px;
      border-bottom:1px solid #f3f4f6;
      font-size:14px;
      color:#333;
      text-align:left;
      cursor:pointer;
      transition:background .18s var(--ease), transform .18s var(--ease);
      transform:translateX(0);
    }

    .sug-item:last-child{ border-bottom:none; }

    .sug-item:hover,
    .sug-item:active{
      background:#f6faff;
      transform:translateX(2px);
    }

    .sug-item b{ display:block; font-size:14px; }
    .sug-item small{ color:#6b7280; font-weight:700; display:block; margin-top:2px; }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:2px;
    }

    .btn{
      flex:1;
      height:50px;
      border:none;
      border-radius:15px;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:#fff;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transition:
        transform .14s var(--ease-bounce),
        box-shadow .22s var(--ease),
        filter .22s var(--ease),
        opacity .22s var(--ease);
      box-shadow:0 8px 20px rgba(0,0,0,0.12);
      will-change:transform;
      position:relative;
      overflow:hidden;
    }

    .btn::after,
    .tool-btn::after,
    .icon-btn::after,
    .clear-btn::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.28), transparent 55%);
      opacity:0;
      transition:opacity .22s var(--ease);
      pointer-events:none;
    }

    .btn:hover::after,
    .tool-btn:hover::after,
    .icon-btn:hover::after,
    .clear-btn:hover::after{
      opacity:1;
    }

    .btn:hover{
      transform:translateY(-1px) scale(1.01);
      filter:saturate(1.04);
    }

    .btn:active{
      transform:scale(0.965);
    }

    .btn-paste{ background:linear-gradient(180deg, #78c3ff 0%, #58acef 100%); }
    .btn-save{ background:linear-gradient(180deg, #2f8ae8 0%, #1976d2 100%); }
    .btn-cancel{ background:linear-gradient(180deg, #b0bccb 0%, #90a0b2 100%); }
    .btn-danger{ background:linear-gradient(180deg, #e25151 0%, #d32f2f 100%); }

    .summary{
      display:flex;
      gap:8px;
      margin:10px 0 12px;
      animation:fadeUp .58s var(--ease);
    }

    .chip{
      flex:1;
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(255,255,255,0.65);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-radius:14px;
      padding:10px;
      text-align:center;
      box-shadow:0 8px 24px rgba(15,23,42,0.05);
      transition:
        transform .24s var(--ease),
        box-shadow .24s var(--ease),
        background .24s var(--ease);
    }

    .chip:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(15,23,42,0.08);
    }

    .chip .n{
      font-weight:1000;
      font-size:18px;
      line-height:1.2;
      display:inline-block;
    }

    .chip .n.pop{
      animation:valuePop .36s var(--ease-bounce);
    }

    .chip .t{
      font-size:11px;
      color:#6b7280;
      font-weight:800;
      margin-top:2px;
    }

    .data-manager{
      border-radius:20px;
      padding:12px;
      margin-bottom:12px;
      border:1px solid rgba(25,118,210,0.08);
      animation:fadeUp .65s var(--ease);
      position:relative;
      overflow:hidden;
      background:var(--card);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
    }

    .data-manager::before{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      top:10px;
      height:44px;
      border-radius:14px;
      background:rgba(25,118,210,0.06);
      transition:transform .32s var(--ease), opacity .22s var(--ease), width .22s var(--ease);
      z-index:0;
      pointer-events:none;
      opacity:0;
    }

    .data-manager.tab-0::before{
      opacity:1;
      transform:translateX(0);
    }

    .data-manager.tab-1::before{
      opacity:1;
      transform:translateX(calc(100% + 8px));
    }

    .data-manager.tab-2::before{
      opacity:1;
      transform:translateX(calc(200% + 16px));
    }

    .manager-row{
      display:flex;
      gap:8px;
      margin-bottom:0;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    .tool-btn{
      flex:1;
      min-width:120px;
      height:42px;
      background:rgba(255,255,255,0.82);
      border:1.5px solid rgba(25,118,210,0.6);
      color:var(--primary);
      border-radius:12px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      position:relative;
      overflow:hidden;
      transition:
        transform .16s var(--ease-bounce),
        box-shadow .22s var(--ease),
        background .22s var(--ease),
        color .22s var(--ease),
        border-color .22s var(--ease);
      box-shadow:0 6px 16px rgba(15,23,42,0.04);
    }

    .tool-btn:hover{
      transform:translateY(-1px) scale(1.01);
      box-shadow:0 10px 22px rgba(25,118,210,0.10);
    }

    .tool-btn:active{
      transform:scale(0.97);
    }

    .tool-btn.primary{
      background:linear-gradient(180deg, #2f8ae8 0%, #1976d2 100%);
      color:#fff;
      border-color:#1976d2;
    }

    .tool-btn.danger{
      border-color:#e25151;
      color:#c62828;
      background:rgba(255,255,255,0.82);
    }

    .search-sticky-wrap{
      position:sticky;
      top:64px;
      z-index:45;
      margin-bottom:12px;
      padding-top:2px;
    }

    .search-sticky-wrap::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-8px;
      height:16px;
      pointer-events:none;
      background:linear-gradient(to bottom, rgba(25,118,210,0.08), rgba(25,118,210,0));
      opacity:.55;
    }

    .search-sticky-box{
      background:rgba(255,255,255,0.84);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.6);
      box-shadow:0 10px 28px rgba(15,23,42,0.08);
      border-radius:24px;
      padding:8px;
      margin-top:2px;
    }

    .search-sticky-box.field{
      position:relative;
    }

    .search-bar{
      width:100%;
      height:46px;
      border-radius:23px;
      border:1.5px solid #d1d9e0;
      padding:0 15px;
      background:rgba(255,255,255,0.88);
      font-size:15px;
      text-align:center;
      outline:none;
      box-shadow:0 4px 16px rgba(15,23,42,0.04);
      transition:
        border-color .22s var(--ease),
        box-shadow .22s var(--ease),
        transform .18s var(--ease),
        background .22s var(--ease);
      margin:0;
    }

    .search-bar:focus{
      transform:translateY(-1px);
      background:#fff;
      border-color:#90caf9;
      box-shadow:0 0 0 4px rgba(100,181,246,0.14), 0 10px 20px rgba(25,118,210,0.06);
    }

    .item{
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:20px;
      padding:16px;
      padding-right:96px;
      margin-bottom:12px;
      position:relative;
      border-left:6px solid #d1d9e0;
      box-shadow:var(--shadow-card);
      overflow:hidden;
      border-top:1px solid rgba(255,255,255,0.55);
      border-right:1px solid rgba(255,255,255,0.55);
      border-bottom:1px solid rgba(255,255,255,0.55);
      transform:translateY(10px);
      opacity:0;
      animation:itemIn .34s var(--ease) forwards;
      transition:
        transform .24s var(--ease),
        box-shadow .24s var(--ease),
        background .24s var(--ease);
    }

    .item:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(15,23,42,0.10);
    }

    .item::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.22), transparent 45%);
      pointer-events:none;
    }

    .c-red{
      border-left-color:var(--danger);
      background:rgba(255,251,251,0.88);
    }

    .c-orange{
      border-left-color:#ff9800;
      background:rgba(255,250,242,0.88);
    }

    .p-name{
      font-weight:1000;
      color:#0d47a1;
      font-size:16px;
      margin-bottom:6px;
      text-transform:uppercase;
      word-break:break-word;
    }

    .p-sku{
      font-size:11px;
      background:#e3f2fd;
      padding:3px 8px;
      border-radius:6px;
      color:#1565c0;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display:inline-block;
      margin-bottom:6px;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
    }

    .meta{
      font-size:13px;
      color:#555;
      margin-top:2px;
    }

    .t-status{
      font-size:14px;
      font-weight:1000;
      margin-top:8px;
      animation:fadeUp .3s var(--ease);
    }

    .t-red{ color:var(--danger); }
    .t-orange{ color:var(--warn); }
    .t-ok{ color:var(--ok); }

    .action-top{
      position:absolute;
      top:12px;
      right:var(--actions-right);
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      width:auto;
      z-index:2;
    }

    .action-bottom{
      position:absolute;
      right:var(--actions-right);
      bottom:12px;
      display:flex;
      flex-direction:row;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      width:auto;
      z-index:2;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border-radius:12px;
      background:rgba(238,246,255,0.88);
      border:1px solid rgba(207,230,255,0.95);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      font-size:17px;
      box-shadow:0 8px 18px rgba(0,0,0,0.06);
      padding:0;
      outline:none;
      color:inherit;
      font-family:inherit;
      appearance:none;
      -webkit-appearance:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      position:relative;
      overflow:hidden;
      transition:
        transform .14s var(--ease-bounce),
        box-shadow .22s var(--ease),
        background .22s var(--ease);
    }

    .icon-btn:hover{
      transform:translateY(-1px) scale(1.03);
      box-shadow:0 12px 22px rgba(0,0,0,0.08);
    }

    .icon-btn:active{
      transform:scale(0.94);
    }

    .icon-btn.danger{
      background:rgba(255,240,240,0.9);
      border-color:#ffd0d0;
    }

    @media (max-width: 380px){
      .item{ padding-right:90px; }
      .action-top{ gap:7px; }
      .action-bottom{ gap:7px; }
      .icon-btn{ width:36px; height:36px; font-size:16px; }
      :root{ --actions-right: 14px; }
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(16px) scale(.96);
      background:rgba(17,24,39,0.84);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      font-weight:900;
      font-size:13px;
      display:none;
      z-index:999;
      max-width:92%;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      opacity:0;
      transition:
        opacity .22s var(--ease),
        transform .22s var(--ease);
    }

    .toast.show{
      display:block;
      opacity:1;
      transform:translateX(-50%) translateY(0) scale(1);
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.28);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:14px;
      opacity:0;
      transition:opacity .22s var(--ease);
    }

    .modal-backdrop.show{
      display:flex;
      opacity:1;
    }

    .modal{
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,0.84);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border-radius:18px;
      padding:14px;
      box-shadow:0 20px 50px rgba(0,0,0,0.20);
      position:relative;
      border:1px solid rgba(255,255,255,0.7);
      transform:translateY(26px) scale(.98);
      opacity:0;
      transition:
        transform .26s var(--ease),
        opacity .26s var(--ease);
    }

    .modal-backdrop.show .modal{
      transform:translateY(0) scale(1);
      opacity:1;
    }

    .modal h2{
      margin:6px 4px 8px;
      font-size:16px;
      color:#0f172a;
      font-weight:1000;
    }

    .modal p{
      margin:0 4px 12px;
      color:#6b7280;
      font-size:13px;
      font-weight:800;
      min-height:18px;
    }

    .modal .btn-row{ margin-top:10px; }

    .modal-x{
      position:absolute;
      top:10px;
      right:10px;
      width:36px;
      height:36px;
      border-radius:50%;
      border:none;
      background:rgba(241,245,249,0.92);
      color:#334155;
      font-size:20px;
      font-weight:1000;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      box-shadow:0 6px 18px rgba(15,23,42,0.08);
      transition:
        transform .14s var(--ease-bounce),
        box-shadow .22s var(--ease),
        background .22s var(--ease);
    }

    .modal-x:hover{
      transform:scale(1.04);
    }

    .modal-x:active{
      transform:scale(0.92);
    }

    @media (max-width:640px){
      .modal-backdrop{
        align-items:flex-end;
        padding:0;
      }

      .modal{
        max-width:none;
        border-radius:20px 20px 0 0;
        padding:16px 14px calc(14px + env(safe-area-inset-bottom));
        transform:translateY(100%);
        opacity:1;
      }

      .modal-backdrop.show .modal{
        transform:translateY(0);
      }

      .modal::before{
        content:"";
        width:42px;
        height:5px;
        border-radius:999px;
        background:#cbd5e1;
        position:absolute;
        top:10px;
        left:50%;
        transform:translateX(-50%);
      }
    }

    .field{
      position:relative;
    }

    .field input{
      padding-right:44px;
    }

    .clear-btn{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%) scale(.92);
      width:30px;
      height:30px;
      border-radius:999px;
      border:1px solid #dbe6f2;
      background:rgba(255,255,255,0.95);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:1000;
      color:#64748b;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      box-shadow:0 6px 14px rgba(15,23,42,0.06);
      transition:
        transform .18s var(--ease-bounce),
        opacity .18s var(--ease),
        box-shadow .18s var(--ease);
      opacity:0;
      overflow:hidden;
    }

    .clear-btn:active{
      transform:translateY(-50%) scale(0.9);
    }

    .field.has-value .clear-btn{
      display:flex;
      opacity:1;
      transform:translateY(-50%) scale(1);
    }

    .empty-state{
      text-align:center;
      color:#64748b;
      font-weight:900;
      padding:18px 8px;
      animation:fadeUp .3s var(--ease);
    }

    @keyframes pageIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @keyframes appRise{
      from{ transform:translateY(8px); opacity:0; }
      to{ transform:translateY(0); opacity:1; }
    }

    @keyframes fadeDown{
      from{ transform:translateY(-8px); opacity:0; }
      to{ transform:translateY(0); opacity:1; }
    }

    @keyframes fadeUp{
      from{ transform:translateY(12px); opacity:0; }
      to{ transform:translateY(0); opacity:1; }
    }

    @keyframes itemIn{
      from{ transform:translateY(12px); opacity:0; }
      to{ transform:translateY(0); opacity:1; }
    }

    @keyframes valuePop{
      0%{ transform:scale(.8); opacity:.75; }
      55%{ transform:scale(1.14); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }

    @keyframes floatGlow{
      0%,100%{ transform:translate3d(0,0,0) scale(1); }
      50%{ transform:translate3d(10px,-10px,0) scale(1.08); }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>📅 KIỂM DATE</h1>

    <div class="input-box">
      <div class="input-group">
        <label>Mã SKU / Barcode</label>

        <div class="field">
          <input id="sku"
                 type="tel"
                 inputmode="numeric"
                 pattern="[0-9]*"
                 placeholder="Nhập hoặc quét mã..."
                 autocomplete="off" />
          <button class="clear-btn" type="button" aria-label="Xoá ô SKU" data-clear="sku">✕</button>
        </div>

        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="input-group">
        <label>Tên sản phẩm</label>
        <div class="field">
          <input id="name" type="text" placeholder="Tên sản phẩm..." autocomplete="off" />
          <button class="clear-btn" type="button" aria-label="Xoá ô Tên" data-clear="name">✕</button>
        </div>
      </div>

      <div class="input-group">
        <label>Hạn sử dụng (HSD)</label>
        <input id="hsd" type="date" />
      </div>

      <div class="btn-row">
        <button id="btnPaste" class="btn btn-paste" type="button">📋 Dán mã</button>
        <button id="btnSave" class="btn btn-save" type="button">💾 Lưu lại</button>
      </div>

      <div id="editRow" class="btn-row" style="display:none; margin-top:10px;">
        <button id="btnCancelEdit" class="btn btn-cancel" type="button">↩️ Huỷ sửa</button>
        <button id="btnDeleteEdit" class="btn btn-danger" type="button">🗑️ Xoá dòng</button>
      </div>
    </div>

    <div class="summary">
      <div class="chip"><div id="sumTotal" class="n">0</div><div class="t">Tổng</div></div>
      <div class="chip"><div id="sumExpired" class="n">0</div><div class="t">Hết hạn</div></div>
      <div class="chip"><div id="sum7" class="n">0</div><div class="t">≤ 7 ngày</div></div>
      <div class="chip"><div id="sum30" class="n">0</div><div class="t">≤ 30 ngày</div></div>
    </div>

    <div id="dataManager" class="data-manager tab-0">
      <div class="manager-row">
        <input type="file" id="csvIn" hidden accept=".csv,text/csv" />
        <button id="btnImport" class="tool-btn" type="button" data-tab="0">📥 NHẬP CSV</button>
        <button id="btnExport" class="tool-btn primary" type="button" data-tab="1">📤 XUẤT CSV</button>
        <button id="btnClearAll" class="tool-btn danger" type="button" data-tab="2">🧹 XOÁ ALL</button>
      </div>
    </div>

    <div class="search-sticky-wrap">
      <div class="field search-sticky-box">
        <input id="search" class="search-bar" type="text" placeholder="Tìm tên / SKU / HSD..." />
        <button class="clear-btn" type="button" aria-label="Xoá ô Tìm" data-clear="search">✕</button>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <button id="modalCloseX" class="modal-x" type="button" aria-label="Đóng popup">✕</button>

      <h2 id="modalTitle">Xác nhận</h2>
      <p id="modalText"></p>

      <div class="btn-row">
        <button id="modalCancel" class="btn btn-cancel" type="button">Huỷ</button>
        <button id="modalAlt" class="btn btn-save" type="button" style="display:none;">Tuỳ chọn</button>
        <button id="modalOk" class="btn btn-danger" type="button">Đồng ý</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const skuI = document.getElementById('sku');
  const nameI = document.getElementById('name');
  const hsdI = document.getElementById('hsd');
  const sugD = document.getElementById('suggestions');
  const listEl = document.getElementById('list');
  const searchI = document.getElementById('search');
  const dataManager = document.getElementById('dataManager');

  const btnPaste = document.getElementById('btnPaste');
  const btnSave = document.getElementById('btnSave');
  const editRow = document.getElementById('editRow');
  const btnCancelEdit = document.getElementById('btnCancelEdit');
  const btnDeleteEdit = document.getElementById('btnDeleteEdit');

  const btnImport = document.getElementById('btnImport');
  const btnExport = document.getElementById('btnExport');
  const btnClearAll = document.getElementById('btnClearAll');
  const csvIn = document.getElementById('csvIn');

  const sumTotal = document.getElementById('sumTotal');
  const sumExpired = document.getElementById('sumExpired');
  const sum7 = document.getElementById('sum7');
  const sum30 = document.getElementById('sum30');

  const toastEl = document.getElementById('toast');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const modalCancel = document.getElementById('modalCancel');
  const modalAlt = document.getElementById('modalAlt');
  const modalOk = document.getElementById('modalOk');
  const modalCloseX = document.getElementById('modalCloseX');

  const KEY_V2 = 'kiemdate_v2';
  const KEY_V2_MAP = 'kiemdate_v2_skuMap';

  let data = [];
  let skuMap = {};
  let editingId = null;

  const now = () => Date.now();
  const trim = (s) => (s ?? '').toString().trim();

  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id_' + Math.random().toString(16).slice(2) + '_' + Date.now().toString(16);
  }

  function debounce(fn, ms = 120) {
    let t = null;
    return (...args) => {
      if (t) clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  function showToast(msg, ms=1500){
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    requestAnimationFrame(() => toastEl.classList.add('show'));
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => {
      toastEl.classList.remove('show');
      setTimeout(() => { toastEl.style.display='none'; }, 220);
    }, ms);
  }

  function storageAvailable(){
    try{
      const k='__test__'+Math.random();
      localStorage.setItem(k,'1');
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  const modalCtl = {
    active: false,
    resolve: null,
    cleanupFns: [],
  };

  function showModal(){
    modalBackdrop.style.display = 'flex';
    requestAnimationFrame(() => modalBackdrop.classList.add('show'));
    modalCtl.active = true;
  }

  function closeModal(resValue=null){
    if(!modalCtl.active) return;

    modalBackdrop.classList.remove('show');
    modalCtl.active = false;

    setTimeout(() => {
      modalBackdrop.style.display = 'none';
    }, 220);

    modalCtl.cleanupFns.forEach(fn => { try{ fn(); }catch{} });
    modalCtl.cleanupFns = [];

    const r = modalCtl.resolve;
    modalCtl.resolve = null;
    if(typeof r === 'function') r(resValue);
  }

  modalCloseX.addEventListener('click', () => closeModal(null));
  modalBackdrop.addEventListener('click', (e) => {
    if(e.target === modalBackdrop) closeModal(null);
  });

  function setBtn(btn, {show=true, text='', cls=''}){
    btn.style.display = show ? '' : 'none';
    if(text !== undefined) btn.textContent = text;
    if(cls) btn.className = cls;
  }

  function openConfirm({title='Xác nhận', text='Bạn chắc chứ?', okText='Đồng ý', cancelText='Huỷ'}){
    return new Promise(resolve => {
      modalCtl.resolve = resolve;

      modalTitle.textContent = title;
      modalText.textContent = text || '';

      setBtn(modalCancel, {show:true, text:cancelText, cls:'btn btn-cancel'});
      setBtn(modalAlt, {show:false});
      setBtn(modalOk, {show:true, text:okText, cls:'btn btn-danger'});

      const onCancel = () => closeModal(false);
      const onOk = () => closeModal(true);

      modalCancel.addEventListener('click', onCancel);
      modalOk.addEventListener('click', onOk);

      modalCtl.cleanupFns.push(() => modalCancel.removeEventListener('click', onCancel));
      modalCtl.cleanupFns.push(() => modalOk.removeEventListener('click', onOk));

      showModal();
    });
  }

  function openChoice2({title='Chọn loại', text='', aText='A', bText='B'}){
    return new Promise(resolve => {
      modalCtl.resolve = resolve;

      modalTitle.textContent = title;
      modalText.textContent = text || '';

      setBtn(modalCancel, {show:false});
      setBtn(modalAlt, {show:true, text:aText, cls:'btn btn-cancel'});
      setBtn(modalOk, {show:true, text:bText, cls:'btn btn-danger'});

      const onA = () => closeModal('a');
      const onB = () => closeModal('b');

      modalAlt.addEventListener('click', onA);
      modalOk.addEventListener('click', onB);

      modalCtl.cleanupFns.push(() => modalAlt.removeEventListener('click', onA));
      modalCtl.cleanupFns.push(() => modalOk.removeEventListener('click', onB));

      showModal();
    });
  }

  function normalizeDateToISO(v){
    v = trim(v);
    if(!v) return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;

    let m = v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m){
      const dd=String(m[1]).padStart(2,'0');
      const mm=String(m[2]).padStart(2,'0');
      const yy=m[3];
      return `${yy}-${mm}-${dd}`;
    }

    m = v.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(m){
      const yy=m[1];
      const mm=String(m[2]).padStart(2,'0');
      const dd=String(m[3]).padStart(2,'0');
      return `${yy}-${mm}-${dd}`;
    }

    const d = new Date(v);
    if(!isNaN(d.getTime())){
      const yy=d.getFullYear();
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const dd=String(d.getDate()).padStart(2,'0');
      return `${yy}-${mm}-${dd}`;
    }
    return '';
  }

  function validISODate(iso){
    if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return false;
    const d = new Date(iso + 'T12:00:00');
    if(isNaN(d.getTime())) return false;
    const [y,m,dd] = iso.split('-').map(Number);
    return d.getFullYear()===y && (d.getMonth()+1)===m && d.getDate()===dd;
  }

  function fmtDMY(iso){
    if(!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function daysLeft(iso){
    const target = new Date(iso + 'T23:59:59');
    return Math.ceil((target.getTime() - now()) / 86400000);
  }

  function statusFor(d){
    if(d < 0) return { cls:'c-red', text:'❌ ĐÃ HẾT HẠN', tcls:'t-red' };
    if(d === 0) return { cls:'c-red', text:'🔥 Hết hạn hôm nay', tcls:'t-red' };
    if(d <= 7) return { cls:'c-red', text:`⚠️ Sắp hết hạn (${d} ngày)`, tcls:'t-red' };
    if(d <= 30) return { cls:'c-orange', text:`⏰ Cận date (${d} ngày)`, tcls:'t-orange' };
    return { cls:'', text:`✅ Còn ${d} ngày`, tcls:'t-ok' };
  }

  function saveStorage(){
    try{
      localStorage.setItem(KEY_V2, JSON.stringify(data));
      localStorage.setItem(KEY_V2_MAP, JSON.stringify(skuMap));
      return true;
    }catch{
      showToast('❌ Không lưu được (localStorage bị chặn)');
      return false;
    }
  }

  function loadStorage(){
    const v2 = localStorage.getItem(KEY_V2);
    const v2m = localStorage.getItem(KEY_V2_MAP);

    if(v2){
      try { data = JSON.parse(v2) || []; } catch { data = []; }
      try { skuMap = JSON.parse(v2m || '{}') || {}; } catch { skuMap = {}; }
      if(!Array.isArray(data)) data = [];
      return;
    }

    const oldDates = localStorage.getItem('dates');
    const oldMap = localStorage.getItem('skuMap');

    if(oldDates || oldMap){
      let od=[], om={};
      try { od = JSON.parse(oldDates || '[]') || []; } catch { od=[]; }
      try { om = JSON.parse(oldMap || '{}') || {}; } catch { om={}; }

      skuMap = (om && typeof om === 'object') ? om : {};
      data = [];

      (Array.isArray(od)?od:[]).forEach(item => {
        const s = trim(item?.sku);
        const h = normalizeDateToISO(item?.hsd);
        const n = trim(item?.name) || skuMap[s] || 'Sản phẩm mới';
        if(s && validISODate(h)){
          data.push({ id: uid(), sku:s, name:n, hsd:h, createdAt: now() });
          if(!skuMap[s]) skuMap[s]=n;
        }
      });

      saveStorage();
      showToast('✅ Đã nâng cấp dữ liệu');
      return;
    }

    data = [];
    skuMap = {};
  }

  function syncClearState(){
    document.querySelectorAll('.field').forEach(f => {
      const input = f.querySelector('input');
      if(!input) return;
      f.classList.toggle('has-value', (input.value || '').trim().length > 0);
    });
  }

  function clearInputById(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.value = '';
    el.focus();

    if(id === 'sku'){
      hideSuggestions();
      nameI.value = '';
    }
    if(id === 'search'){
      render();
    }
    syncClearState();
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.clear-btn');
    if(!btn) return;
    const id = btn.getAttribute('data-clear');
    clearInputById(id);
  });

  function hideSuggestions(){
    sugD.classList.remove('show');
    setTimeout(() => {
      if(!sugD.classList.contains('show')){
        sugD.style.display='none';
        sugD.innerHTML='';
      }
    }, 220);
  }

  function getSuggestionPool(){
    const pool = new Map();
    Object.keys(skuMap || {}).forEach(s => {
      const n = trim(skuMap[s] || '');
      if(s) pool.set(s, n);
    });
    (Array.isArray(data) ? data : []).forEach(it => {
      const s = trim(it?.sku);
      const n = trim(it?.name);
      if(!s) return;
      if(!pool.has(s)) pool.set(s, n);
      if(pool.has(s) && !pool.get(s) && n) pool.set(s, n);
    });
    return Array.from(pool.entries()).map(([sku, name]) => ({ sku, name }));
  }

  function updateSuggestions(){
    const val = trim(skuI.value);
    sugD.innerHTML = '';

    if(skuMap[val]) nameI.value = skuMap[val];
    if(val.length < 2){ hideSuggestions(); return; }

    const q = val.toLowerCase();
    const pool = getSuggestionPool();
    const matches = pool
      .filter(x => x.sku.toLowerCase().includes(q) || (x.name || '').toLowerCase().includes(q))
      .slice(0, 8);

    if(matches.length === 0){ hideSuggestions(); return; }

    matches.forEach(m => {
      const div = document.createElement('div');
      div.className = 'sug-item';

      const b = document.createElement('b');
      b.textContent = m.sku;

      const sm = document.createElement('small');
      sm.textContent = m.name || '(chưa có tên)';

      div.appendChild(b);
      div.appendChild(sm);

      div.addEventListener('click', () => {
        skuI.value = m.sku;
        if(m.name) nameI.value = m.name;
        hideSuggestions();
        syncClearState();
        hsdI.focus();
      });

      sugD.appendChild(div);
    });

    sugD.style.display = 'block';
    requestAnimationFrame(() => sugD.classList.add('show'));
  }

  document.addEventListener('click', (e) => {
    if(!e.target.closest('.input-group')) hideSuggestions();
  });

  function scrollToEditForm(){
    const inputBox = document.querySelector('.input-box');
    if(!inputBox) return;

    const targetY = Math.max(
      0,
      inputBox.getBoundingClientRect().top + window.pageYOffset - 10
    );

    window.scrollTo({
      top: targetY,
      behavior: 'smooth'
    });

    setTimeout(() => {
      hsdI.focus();
    }, 320);
  }

  function enterEdit(id){
    const item = data.find(x => x.id === id);
    if(!item) return;

    editingId = id;
    skuI.value = item.sku;
    nameI.value = item.name;
    hsdI.value = item.hsd;

    btnSave.textContent = '✅ Cập nhật';
    editRow.style.display = 'flex';
    editRow.style.animation = 'fadeUp .24s cubic-bezier(.22,.8,.2,1)';

    hideSuggestions();
    syncClearState();

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scrollToEditForm();
      });
    });

    showToast('✏️ Đang sửa dòng');
  }

  function exitEdit(){
    editingId = null;
    btnSave.textContent = '💾 Lưu lại';
    editRow.style.display = 'none';
    skuI.value='';
    nameI.value='';
    hsdI.value='';
    hideSuggestions();
    syncClearState();
  }

  async function upsert(){
    if(!storageAvailable()){
      showToast('❌ localStorage bị chặn (mở Safari/Chrome thật, không ẩn danh/webview)');
      return;
    }

    const s = trim(skuI.value);
    const nIn = trim(nameI.value);
    const h = normalizeDateToISO(hsdI.value);

    if(!s){ showToast('⚠️ Vui lòng nhập SKU'); skuI.focus(); syncClearState(); return; }
    if(!validISODate(h)){ showToast('⚠️ HSD không hợp lệ'); hsdI.focus(); syncClearState(); return; }

    const finalName = nIn || skuMap[s] || 'Sản phẩm mới';

    if(skuMap[s] && nIn && skuMap[s] !== nIn){
      const ok = await openConfirm({
        title:'Đổi tên SKU?',
        text:`SKU "${s}" đang là "${skuMap[s]}". Đổi thành "${nIn}" cho tất cả dòng cùng SKU?`,
        okText:'Đổi tất cả',
        cancelText:'Giữ tên cũ'
      });
      if(ok){
        skuMap[s] = nIn;
        data.forEach(it => { if(it.sku === s) it.name = nIn; });
      }else{
        nameI.value = skuMap[s];
      }
    }

    if(!skuMap[s] || (nIn && trim(nIn))){
      skuMap[s] = trim(nameI.value) || skuMap[s] || finalName;
    }

    if(editingId){
      const idx = data.findIndex(x => x.id === editingId);
      if(idx === -1){ showToast('⚠️ Không tìm thấy dòng để sửa'); exitEdit(); return; }

      const dup = data.find(x => x.id !== editingId && x.sku === s && x.hsd === h);
      if(dup){
        const ok = await openConfirm({
          title:'Trùng SKU + HSD',
          text:'Đã có dòng khác cùng SKU và HSD. Bạn muốn gộp (xoá dòng đang sửa)?',
          okText:'Gộp',
          cancelText:'Không'
        });
        if(ok){
          dup.name = skuMap[s] || finalName;
          data.splice(idx, 1);
          saveStorage();
          render();
          syncClearState();
          showToast('✅ Đã gộp');
          exitEdit();
        }
        return;
      }

      data[idx].sku = s;
      data[idx].hsd = h;
      data[idx].name = skuMap[s] || finalName;

      saveStorage();
      render();
      syncClearState();
      showToast('✅ Đã cập nhật');
      exitEdit();
      return;
    }

    const exist = data.find(x => x.sku === s && x.hsd === h);
    if(exist){
      const ok = await openConfirm({
        title:'Đã tồn tại',
        text:'Dòng này (cùng SKU + HSD) đã có. Cập nhật tên cho dòng đó?',
        okText:'Cập nhật',
        cancelText:'Thêm mới'
      });

      if(ok){
        exist.name = skuMap[s] || finalName;
      }else{
        data.push({ id: uid(), sku:s, name: skuMap[s] || finalName, hsd:h, createdAt: now() });
      }

      saveStorage();
      render();
      showToast('✅ Xong');
      skuI.value='';
      nameI.value='';
      hsdI.value='';
      syncClearState();
      return;
    }

    data.push({ id: uid(), sku:s, name: skuMap[s] || finalName, hsd:h, createdAt: now() });
    saveStorage();
    render();
    showToast('✅ Đã lưu');
    skuI.value='';
    nameI.value='';
    hsdI.value='';
    syncClearState();
  }

  async function deleteById(id){
    const item = data.find(x => x.id === id);
    if(!item) return;

    const ok = await openConfirm({
      title:'Xoá dòng?',
      text:`Xoá "${item.name}" (SKU ${item.sku}, HSD ${fmtDMY(item.hsd)})?`,
      okText:'Xoá',
      cancelText:'Huỷ'
    });
    if(!ok) return;

    data = data.filter(x => x.id !== id);
    saveStorage();
    render();
    syncClearState();
    showToast('🗑️ Đã xoá');
    if(editingId === id) exitEdit();
  }

  function animateNumberIfChanged(el, nextValue){
    const newVal = String(nextValue);
    if(el.textContent !== newVal){
      el.textContent = newVal;
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }
  }

  function computeSummary(items){
    let expired=0, le7=0, le30=0;
    items.forEach(it => {
      const d = daysLeft(it.hsd);
      if(d < 0) expired++;
      if(d >= 0 && d <= 7) le7++;
      if(d >= 0 && d <= 30) le30++;
    });

    animateNumberIfChanged(sumTotal, items.length);
    animateNumberIfChanged(sumExpired, expired);
    animateNumberIfChanged(sum7, le7);
    animateNumberIfChanged(sum30, le30);
  }

  function render(){
    data = (Array.isArray(data)?data:[]).filter(x => x && x.id && x.sku && validISODate(x.hsd));
    computeSummary(data);

    const key = trim(searchI.value).toLowerCase();
    const filtered = data.filter(it => {
      if(!key) return true;
      const hay = `${it.name} ${it.sku} ${it.hsd} ${fmtDMY(it.hsd)}`.toLowerCase();
      return hay.includes(key);
    });

    filtered.sort((a,b) => {
      const da = daysLeft(a.hsd);
      const db = daysLeft(b.hsd);
      if(da !== db) return da - db;
      return a.sku.localeCompare(b.sku);
    });

    listEl.innerHTML = '';

    if(filtered.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = key ? 'Không tìm thấy kết quả.' : 'Chưa có dữ liệu. Nhập SKU + HSD để lưu.';
      listEl.appendChild(empty);
      return;
    }

    const frag = document.createDocumentFragment();

    filtered.forEach((it, index) => {
      const d = daysLeft(it.hsd);
      const st = statusFor(d);

      const card = document.createElement('div');
      card.className = 'item ' + st.cls;
      card.style.animationDelay = `${Math.min(index * 35, 240)}ms`;

      const name = document.createElement('div');
      name.className = 'p-name';
      name.textContent = it.name || 'Sản phẩm';

      const skuLine = document.createElement('div');
      const sku = document.createElement('span');
      sku.className = 'p-sku';
      sku.textContent = it.sku;
      skuLine.appendChild(sku);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.appendChild(document.createTextNode('HSD: '));
      const b = document.createElement('b');
      b.textContent = fmtDMY(it.hsd);
      meta.appendChild(b);

      const status = document.createElement('div');
      status.className = 't-status ' + st.tcls;
      status.textContent = st.text;

      const actTop = document.createElement('div');
      actTop.className = 'action-top';

      const actBottom = document.createElement('div');
      actBottom.className = 'action-bottom';

      const btnEdit = document.createElement('button');
      btnEdit.type = 'button';
      btnEdit.className = 'icon-btn';
      btnEdit.title = 'Sửa';
      btnEdit.textContent = '✏️';
      btnEdit.addEventListener('click', () => enterEdit(it.id));

      const btnCopy = document.createElement('button');
      btnCopy.type = 'button';
      btnCopy.className = 'icon-btn';
      btnCopy.title = 'Copy SKU';
      btnCopy.textContent = '📋';
      btnCopy.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(it.sku);
          showToast('📋 Đã copy SKU');
        } catch {
          showToast('⚠️ Clipboard bị chặn');
        }
      });

      const btnDel = document.createElement('button');
      btnDel.type = 'button';
      btnDel.className = 'icon-btn danger';
      btnDel.title = 'Xoá';
      btnDel.textContent = '🗑️';
      btnDel.addEventListener('click', () => deleteById(it.id));

      actTop.appendChild(btnDel);
      actBottom.appendChild(btnEdit);
      actBottom.appendChild(btnCopy);

      card.appendChild(name);
      card.appendChild(skuLine);
      card.appendChild(meta);
      card.appendChild(status);
      card.appendChild(actTop);
      card.appendChild(actBottom);

      frag.appendChild(card);
    });

    listEl.appendChild(frag);
  }

  function detectDelimiter(text){
    const cleaned = text.replace(/^\uFEFF/, '');
    const lines = cleaned.split(/\r?\n/).filter(l => l.trim() !== '');
    const first = lines[0] || '';
    const c = (first.match(/,/g) || []).length;
    const s = (first.match(/;/g) || []).length;
    return s > c ? ';' : ',';
  }

  function parseCSV(text, delimiter){
    const rows = [];
    let row = [];
    let field = '';
    let i = 0;
    let inQuotes = false;

    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    while(i < text.length){
      const ch = text[i];

      if(inQuotes){
        if(ch === '"'){
          if(text[i+1] === '"'){ field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += ch; i++; continue;
      }else{
        if(ch === '"'){ inQuotes = true; i++; continue; }
        if(ch === delimiter){ row.push(field); field = ''; i++; continue; }
        if(ch === '\n'){
          row.push(field);
          if(row.some(v => trim(v) !== '')) rows.push(row);
          row = []; field = ''; i++; continue;
        }
        field += ch; i++; continue;
      }
    }

    row.push(field);
    if(row.some(v => trim(v) !== '')) rows.push(row);
    return rows;
  }

  function toCSVCell(v){
    v = (v ?? '').toString();
    const needs = /[",;\n\r]/.test(v);
    v = v.replace(/"/g, '""');
    return needs ? `"${v}"` : v;
  }

  async function importCSV(file){
    try{
      const text = await file.text();
      const delimiter = detectDelimiter(text);
      const rows = parseCSV(text.replace(/^\uFEFF/, ''), delimiter);

      if(rows.length === 0){ showToast('⚠️ CSV trống'); return; }

      const header = rows[0].map(h => trim(h).toLowerCase());
      const hasHeader =
        header.includes('sku') || header.includes('barcode') || header.includes('name') ||
        header.includes('hsd') || header.includes('expiry') || header.includes('exp') ||
        header.includes('ma san pham') || header.includes('mã sản phẩm') ||
        header.includes('ten san pham') || header.includes('tên sản phẩm') ||
        header.includes('han su dung') || header.includes('hạn sử dụng');

      let start = hasHeader ? 1 : 0;

      const colIndex = (keys, fallback) => {
        for (const k of keys) {
          const idx = header.indexOf(k);
          if (idx >= 0) return idx;
        }
        return fallback;
      };

      const idxSku = hasHeader ? colIndex(['sku','barcode','ma san pham','mã sản phẩm'], 0) : 0;
      const idxName = hasHeader ? colIndex(['name','ten san pham','tên sản phẩm'], 1) : 1;
      const idxHsd  = hasHeader ? colIndex(['hsd','expiry','exp','han su dung','hạn sử dụng'], 2) : 2;

      let mapAdded = 0;
      let added = 0, updated = 0, skipped = 0;

      for(let r=start; r<rows.length; r++){
        const row = rows[r];
        if(!row || row.length === 0) continue;

        const s = trim(row[idxSku] ?? '');
        const n = trim(row[idxName] ?? '');
        if(!s){ skipped++; continue; }

        const rawH = row[idxHsd];
        const h = normalizeDateToISO(rawH ?? '');

        if(!rawH || !trim(rawH) || !validISODate(h)){
          const finalName = n || skuMap[s] || 'Sản phẩm mới';
          if(!skuMap[s] && finalName){
            skuMap[s] = finalName; mapAdded++;
          }else if(n && skuMap[s] !== n){
            skuMap[s] = n; mapAdded++;
          }
          continue;
        }

        const finalName = n || skuMap[s] || 'Sản phẩm mới';
        if(!skuMap[s] || (n && n !== skuMap[s])) { skuMap[s] = finalName; mapAdded++; }

        const exist = data.find(x => x.sku === s && x.hsd === h);
        if(exist){
          exist.name = skuMap[s] || finalName;
          updated++;
        }else{
          data.push({ id: uid(), sku:s, name: skuMap[s] || finalName, hsd:h, createdAt: now() });
          added++;
        }
      }

      saveStorage();
      render();
      syncClearState();
      showToast(`✅ Import: DS SP +${mapAdded}, Đã kiểm +${added}, cập nhật ${updated}, bỏ qua ${skipped}`);
    }catch{
      showToast('❌ Import lỗi');
    }
  }

  function exportCheckedCSV(){
    try{
      const out = [...data].sort((a,b) => a.hsd.localeCompare(b.hsd));
      let csv = '\uFEFF' + ['sku','name','hsd'].join(',') + '\n';
      out.forEach(it => {
        csv += [toCSVCell(it.sku), toCSVCell(it.name), toCSVCell(it.hsd)].join(',') + '\n';
      });

      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'kiem_date_da_kiem.csv';
      a.rel = 'noopener';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);

      showToast('📤 Đã xuất: DS đã kiểm');
    }catch{
      showToast('❌ Không xuất được');
    }
  }

  function exportProductsCSV(){
    try{
      const entries = Object.entries(skuMap || {})
        .map(([sku, name]) => ({ sku: trim(sku), name: trim(name) }))
        .filter(x => x.sku);

      entries.sort((a,b) => a.sku.localeCompare(b.sku));

      let csv = '\uFEFF' + ['sku','name'].join(',') + '\n';
      entries.forEach(it => {
        csv += [toCSVCell(it.sku), toCSVCell(it.name)].join(',') + '\n';
      });

      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'kiem_date_danh_sach_san_pham.csv';
      a.rel = 'noopener';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);

      showToast('📤 Đã xuất: DS sản phẩm');
    }catch{
      showToast('❌ Không xuất được');
    }
  }

  async function smartPaste(){
    try{
      const t = await navigator.clipboard.readText();
      if(!t){ showToast('⚠️ Clipboard trống'); return; }
      skuI.value = trim(t);
      syncClearState();
      updateSuggestions();
      hsdI.focus();
      showToast('📋 Đã dán SKU');
    }catch{
      showToast('⚠️ Clipboard bị chặn');
    }
  }

  const updateSuggestionsDebounced = debounce(updateSuggestions, 80);
  const renderDebounced = debounce(render, 120);

  skuI.addEventListener('input', () => {
    syncClearState();
    updateSuggestionsDebounced();
  });

  nameI.addEventListener('input', syncClearState);

  searchI.addEventListener('input', () => {
    syncClearState();
    renderDebounced();
  });

  btnPaste.addEventListener('click', smartPaste);
  btnSave.addEventListener('click', upsert);

  btnCancelEdit.addEventListener('click', () => {
    exitEdit();
    showToast('↩️ Đã huỷ sửa');
  });

  btnDeleteEdit.addEventListener('click', async () => {
    if(editingId) await deleteById(editingId);
  });

  btnImport.addEventListener('click', () => {
    dataManager.classList.remove('tab-1','tab-2');
    dataManager.classList.add('tab-0');
    csvIn.click();
  });

  btnExport.addEventListener('click', async () => {
    dataManager.classList.remove('tab-0','tab-2');
    dataManager.classList.add('tab-1');

    const pick = await openChoice2({
      title:'Chọn loại CSV',
      text:'',
      aText:'Xuất đã kiểm',
      bText:'Xuất sản phẩm'
    });

    if(pick === 'a') exportCheckedCSV();
    else if(pick === 'b') exportProductsCSV();
  });

  btnClearAll.addEventListener('click', async () => {
    dataManager.classList.remove('tab-0','tab-1');
    dataManager.classList.add('tab-2');

    const ok = await openConfirm({
      title:'Xoá toàn bộ?',
      text:'Bạn muốn xoá tất cả dữ liệu trong máy? (Không khôi phục được)',
      okText:'Xoá ALL',
      cancelText:'Huỷ'
    });
    if(!ok) return;

    data = [];
    skuMap = {};
    editingId = null;
    saveStorage();
    render();
    exitEdit();
    syncClearState();
    showToast('🧹 Đã xoá toàn bộ');
  });

  csvIn.addEventListener('change', async () => {
    const f = csvIn.files && csvIn.files[0];
    if(!f) return;
    await importCSV(f);
    csvIn.value = '';
  });

  if(!storageAvailable()){
    showToast('⚠️ localStorage bị chặn (mở Safari/Chrome thật, không ẩn danh/webview)', 2400);
  }

  loadStorage();
  render();
  syncClearState();
})();
</script>
